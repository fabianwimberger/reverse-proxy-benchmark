name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.13"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: pip install ruff mypy

      - name: Lint with ruff
        run: ruff check analyze_results.py

      - name: Format check with ruff
        run: ruff format --check analyze_results.py

      - name: Type check with mypy
        run: mypy analyze_results.py --ignore-missing-imports

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t reverse-proxy-benchmark:test .

      - name: Test container starts
        run: docker run --rm reverse-proxy-benchmark:test python3 --version

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run quick benchmark
        run: make RATE=50 DURATION=2s CONNECTIONS=2

      - name: Verify output files
        run: |
          expected=24
          if [ ! -d "results" ]; then
            echo "results directory not found"
            exit 1
          fi
          count="$(find results -name "*.json" -type f | wc -l)"
          if [ "$count" -ne "$expected" ]; then
            echo "Expected $expected result files, found $count"
            exit 1
          fi
          while IFS= read -r file; do
            if [ ! -s "$file" ]; then
              echo "Empty result file: $file"
              exit 1
            fi
            python3 - "$file" <<'PY'
          import json
          import sys

          path = sys.argv[1]
          with open(path, encoding="utf-8") as f:
              data = json.load(f)

          failures = []
          if data.get("requests", 0) <= 0:
              failures.append("no requests")
          if data.get("rate", 0) <= 0:
              failures.append("zero rate")
          if data.get("throughput", 0) <= 0:
              failures.append("zero throughput")
          if "https_http2.json" in path and data.get("success", 0) <= 0:
              failures.append("HTTP/2 scenario has zero success")

          if failures:
              print(f"{path}: {', '.join(failures)}")
              sys.exit(1)
          PY
          done < <(find results -name "*.json" -type f)
          echo "All result files are valid"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-test-results
          path: results/
