global
    log stdout format raw local0
    maxconn 100000
    # Tune SSL for performance
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    ssl-default-bind-options no-sslv3 no-tlsv10 no-tlsv11 no-tls-tickets

defaults
    log global
    mode http
    option httplog
    option dontlognull
    timeout connect 5s
    timeout client 50s
    timeout server 50s
    # Enable HTTP keep-alive
    option http-keep-alive

frontend http-in
    bind *:80
    default_backend web_servers

frontend https-in
    # The haproxy.pem contains both cert and key, generated by Makefile
    bind *:443 ssl crt /etc/haproxy/ssl/haproxy.pem alpn h2,http/1.1
    default_backend web_servers

backend web_servers
    balance roundrobin
    # reuse connections to backend for performance
    http-reuse always
    server backend1 backend:8080 check maxconn 10000
